# Netlify Configuration for Unicorn Sports PWA

[build]
  # Build command - runs in the frontend directory
  # Use yarn to avoid npm package-lock.json generation bug
  command = "yarn install && yarn build"

  # Directory to publish - Vite outputs to 'dist'
  publish = "dist"

  # Base directory (important!)
  base = "frontend"

[build.environment]
  # Node version
  NODE_VERSION = "20"

# SPA routing - redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"

    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"

    # XSS Protection (legacy, CSP is better)
    X-XSS-Protection = "1; mode=block"

    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"

    # HSTS - Force HTTPS for 1 year (required by PSP)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Content Security Policy (CSP) - Critical for payment security
    # Note: Vite requires 'unsafe-inline' for HMR in development
    # In production, inline styles are bundled into CSS files
    Content-Security-Policy = '''
      default-src 'none';
      script-src 'self' https://*.supabase.co;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https://*.supabase.co https://www.unicorns.org.pl https://images.unsplash.com https://lh3.googleusercontent.com blob:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co;
      frame-src 'self' https://autopay.pl https://*.autopay.pl;
      manifest-src 'self';
      worker-src 'self';
      object-src 'none';
      base-uri 'self';
      form-action 'self' https://autopay.pl;
      frame-ancestors 'none';
      upgrade-insecure-requests;
    '''

    # Permissions Policy - Disable unused browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"

    # Enable PWA features
    Service-Worker-Allowed = "/"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache PWA assets
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache the service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Don't cache the manifest
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Environment variables (set these in Netlify dashboard):
# VITE_SUPABASE_URL - Your Supabase project URL
# VITE_SUPABASE_ANON_KEY - Your Supabase anon/public key
