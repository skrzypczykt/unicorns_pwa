# Netlify Configuration for Unicorn Sports PWA

[build]
  # Build command - runs in the frontend directory
  # Clean node_modules first to avoid cache conflicts, then install and build
  # Use --legacy-peer-deps due to vite-plugin-pwa not yet supporting vite@8
  command = "rm -rf node_modules && npm install --legacy-peer-deps && npm run build"

  # Directory to publish - Vite outputs to 'dist'
  publish = "dist"

  # Base directory (important!)
  base = "frontend"

[build.environment]
  # Node version (required: >= 20 for Vite 8, Supabase, React Router 7)
  NODE_VERSION = "20"

  # Enable dependency caching for faster builds
  NPM_FLAGS = "--legacy-peer-deps"

# SPA routing - redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Enable PWA features
    Service-Worker-Allowed = "/"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache PWA assets
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache the service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Don't cache the manifest
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Environment variables (set these in Netlify dashboard):
# VITE_SUPABASE_URL - Your Supabase project URL
# VITE_SUPABASE_ANON_KEY - Your Supabase anon/public key
