<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Powrót z płatności...</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 400px;
    }
    .spinner {
      font-size: 60px;
      animation: spin 2s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      color: #667eea;
      margin: 0 0 10px 0;
      font-size: 24px;
    }
    p {
      color: #666;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner">🦄</div>
    <h1>Powrót z płatności...</h1>
    <p>Przetwarzamy wynik Twojej płatności</p>
  </div>

  <script>
    // Pobierz parametry z URL (GET) lub z formularza (POST)
    const urlParams = new URLSearchParams(window.location.search);

    // Sprawdź czy są parametry w URL
    let orderID = urlParams.get('OrderID') || urlParams.get('orderId');

    // Jeśli nie ma w URL, znaczy że przyszło POST - przekieruj do React route
    // React Router obsłuży wyświetlenie wyniku
    setTimeout(() => {
      if (orderID) {
        // Parametry w URL - przekaż do React
        window.location.href = '/payment-success?' + urlParams.toString();
      } else {
        // Brak parametrów - przekieruj do głównej
        window.location.href = '/';
      }
    }, 1000);
  </script>
</body>
</html>
