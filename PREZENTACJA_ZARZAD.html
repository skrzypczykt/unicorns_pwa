<h3 id="1-content-security-policy-csp">1. Content Security Policy (CSP)</h3>
<p><strong>Co to:</strong> Kontrola źródeł skryptów, stylów i zasobów</p>
<p><strong>Korzyści:</strong></p>
<ul>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Blokuje XSS attacks (wstrzykiwanie kodu)</li>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Zapobiega code injection</li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> <strong>WYMAGANE przez operatorów płatności</strong></li>
</ul>
<h3 id="2-hsts-http-strict-transport-security">2. HSTS (HTTP Strict Transport Security)</h3>
<p><strong>Co to:</strong> Wymuszenie HTTPS przez 1 rok</p>
<p><strong>Korzyści:</strong></p>
<ul>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Zapobiega Man-in-the-Middle attacks</li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Szyfrowanie całej komunikacji</li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> <strong>WYMAGANE przez operatorów płatności</strong></li>
</ul>
<h3 id="3-cors-restrictions">3. CORS Restrictions</h3>
<p><strong>Co to:</strong> Ograniczenie dozwolonych domen</p>
<p><strong>Przed:</strong> <code>Access-Control-Allow-Origin: *</code> <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> (WSZYSCY!)<br />
<strong>Po:</strong> <code>Access-Control-Allow-Origin: unicorns.org.pl</code> <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> (tylko my)</p>
<p><strong>Korzyści:</strong></p>
<ul>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Zapobiega CSRF attacks</li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> <strong>WYMAGANE przez operatorów płatności</strong></li>
</ul>
<h3 id="4-row-level-security-rls">4. Row Level Security (RLS)</h3>
<p><strong>Co to:</strong> Polityki dostępu na poziomie bazy danych</p>
<p><strong>Przykład:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Użytkownik widzi tylko swoje rezerwacje</span>
<span class="hljs-keyword">CREATE</span> POLICY &quot;Users see own registrations&quot;
<span class="hljs-keyword">ON</span> registrations <span class="hljs-keyword">FOR</span> <span class="hljs-keyword">SELECT</span>
<span class="hljs-keyword">USING</span> (auth.uid() <span class="hljs-operator">=</span> user_id);

<span class="hljs-comment">-- Admin widzi wszystko</span>
<span class="hljs-keyword">CREATE</span> POLICY &quot;Admins see all&quot;
<span class="hljs-keyword">ON</span> registrations <span class="hljs-keyword">FOR</span> <span class="hljs-keyword">ALL</span>
<span class="hljs-keyword">USING</span> (is_admin());
</code></pre>
</section>

<li>A02: Cryptographic Failures → <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> HTTPS + HSTS</li>
<li>A03: Injection → <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Prepared statements + CSP</li>
<li>A04: Insecure Design → <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Security by design</li>
<li>A05: Security Misconfiguration → <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Naprawione</li>
<li>A06: Vulnerable Components → <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Aktualne biblioteki</li>
<li>A07: Auth Failures → <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Supabase Auth (bcrypt)</li>
<li>A08: Data Integrity → <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Signature verification</li>
</ul>
<p><strong>OWASP:</strong> Open Web Application Security Project - globalny standard bezpieczeństwa aplikacji webowych</p>
<h3 id="%E2%9C%85-pci-dss-saq-a"><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> PCI DSS SAQ A</h3>
<p><strong>Co to:</strong> Payment Card Industry Data Security Standard<br />
<strong>SAQ A:</strong> Poziom dla aplikacji, które <strong>nie przechowują</strong> danych kart</p>
<p><strong>Nasze podejście:</strong></p>
<ul>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Dane kart obsługuje dostawca (Autopay/Stripe/PayU/Tpay)</li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Aplikacja tylko przekierowuje do bramki</li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Nie przechowujemy CVV, numer karty, itp.</li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> HTTPS + HSTS + CSP + CORS</li>
</ul>
<p><strong>Wniosek:</strong> Architektura zgodna z PCI DSS SAQ A <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/></p>

<h2 id="%F0%9F%94%90-weryfikacja-podpis%C3%B3w-webhook%C3%B3w"><img class="emoji" draggable="false" alt="🔐" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f510.svg" data-marp-twemoji=""/> Weryfikacja podpisów (webhooków)</h2>
<h3 id="problem">Problem:</h3>
<p><img class="emoji" draggable="false" alt="❓" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2753.svg" data-marp-twemoji=""/> Skąd wiemy, że webhook pochodzi od Autopay/Stripe, a nie od hakera?</p>
<h3 id="rozwi%C4%85zanie-1">Rozwiązanie:</h3>
<p><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> <strong>Signature Verification</strong> - każdy webhook ma podpis cyfrowy</p>
<p><strong>Algorytmy:</strong></p>
<ul>
<li><strong>Autopay:</strong> SHA256 HMAC</li>
<li><strong>Stripe:</strong> SHA256 HMAC + timestamp</li>
<li><strong>PayU:</strong> MD5/SHA256</li>
<li><strong>Tpay:</strong> MD5 checksum</li>
</ul>
<p><strong>Proces:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>1. Webhook przychodzi z danymi + Hash
2. Obliczamy Hash z danych + Shared Key
3. Porównujemy Hash
4. Jeśli się zgadza → OK <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/>
5. Jeśli nie → odrzucamy <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> (401 Unauthorized)
</code></pre>
</section>

<h2 id="%F0%9F%9B%A1%EF%B8%8F-zabezpieczenia-p%C5%82atno%C5%9Bci"><img class="emoji" draggable="false" alt="🛡️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f6e1.svg" data-marp-twemoji=""/> Zabezpieczenia płatności</h2>
<h3 id="%E2%9C%85-zaimplementowane"><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Zaimplementowane:</h3>
<ol>
<li>
<p><strong>Signature Verification</strong></p>
<ul>
<li>Każdy webhook weryfikuje podpis przed przetworzeniem</li>
<li>Ochrona przed fałszywymi powiadomieniami</li>
</ul>
</li>
<li>
<p><strong>Idempotency (deduplikacja)</strong></p>
<ul>
<li>Wielokrotne wywołanie tego samego webhook nie duplikuje płatności</li>
<li>Funkcja: <code>is_webhook_duplicate(order_id, provider)</code></li>
</ul>
</li>
<li>
<p><strong>Webhook Events Log</strong></p>
<ul>
<li>Każde zdarzenie zapisywane do tabeli <code>webhook_events</code></li>
<li>Audit trail - pełna historia</li>
<li>Debugowanie błędów</li>
</ul>
</li>
<li>
<p><strong>HTTPS Only</strong></p>
<ul>
<li>Cała komunikacja szyfrowana</li>
<li>HSTS wymusza HTTPS</li>
</ul>
</li>
<li>
<p><strong>Service Role Key</strong></p>
<ul>
<li>Webhook omija RLS (musi mieć uprawnienia do update)</li>
<li>Klucz przechowywany w secrets (nie w kodzie!)</li>
</ul>
</li>
</ol>

<h2 id="%F0%9F%92%B0-model-p%C5%82atno%C5%9Bci-post-paid"><img class="emoji" draggable="false" alt="💰" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4b0.svg" data-marp-twemoji=""/> Model płatności: POST-PAID</h2>
<h3 id="co-to-znaczy">Co to znaczy?</h3>
<p><strong>POST-PAID</strong> = płatność PO zajęciach (nie przed)</p>
<h3 id="proces">Proces:</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>1. User zapisuje się → DARMOWA rejestracja
2. User przychodzi na zajęcia
3. Trener oznacza obecność → status = 'attended'
4. System generuje przypomnienie o płatności
5. User płaci online (BLIK/karta)
6. System aktualizuje payment_status = 'paid'
</code></pre>
<h3 id="dlaczego-post-paid">Dlaczego POST-PAID?</h3>
<ul>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Niższy próg wejścia (można się zapisać bez płacenia)</li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Większa frekwencja</li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Użytkownik płaci tylko za to, na czym był</li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Flexibility dla członków</li>
</ul>
<h3 id="alternatywa-do-rozwa%C5%BCenia">Alternatywa (do rozważenia):</h3>
<p><strong>PRE-PAID</strong> = płatność PRZED zajęciami</p>
<ul>
<li>Wymagana płatność przy zapisie</li>
<li>Gwarancja przychodów</li>
<li>Może zmniejszyć frekwencję (próg psychologiczny)</li>
